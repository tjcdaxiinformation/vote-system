<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年小區職務會選票唱票計票系統 (官方數據版)</title>
    <style>
        /* ==========================================
           🎨 100% 離線純 CSS 設計：大會藍金尊爵風格
           ========================================== */
        :root {
            --bg-dark: #0b0f19;
            --panel-dark: #151f32;
            --border-dark: #273549;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-gold: #f59e0b;
            --accent-green: #10b981;
            --accent-red: #f43f5e;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 12px; overflow-x: hidden; }

        /* 通用元件 */
        .badge { padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.8rem; }
        .badge-blue { background-color: #1e3a8a; color: #60a5fa; border: 1px solid #3b82f6; }
        .badge-gold { background-color: #78350f; color: #fcd34d; border: 1px solid #d97706; }

        /* 雙階段切換滑塊 */
        .phase-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background-color: #0f172a;
            padding: 6px;
            border-radius: 10px;
            border: 2px solid var(--border-dark);
            margin-bottom: 12px;
        }
        .phase-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .phase-btn:hover { color: var(--text-main); background-color: #1e293b; }
        .phase-btn.active {
            background-color: #0284c7;
            color: white;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }
        .phase-btn.active.gold-mode {
            background-color: #d97706;
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);
        }

        /* 控制台版面 */
        .console-container { display: grid; grid-template-columns: 240px 1fr 320px; gap: 12px; height: 95vh; }
        @media(max-width: 1200px) { .console-container { grid-template-columns: 1fr; height: auto; } }

        /* 左側導航欄 */
        .sidebar { background-color: var(--panel-dark); border-radius: 10px; padding: 12px; border: 1px solid var(--border-dark); display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
        .sidebar-title { font-size: 1rem; font-weight: bold; color: var(--accent-blue); margin-bottom: 8px; border-bottom: 2px solid var(--border-dark); padding-bottom: 6px; }
        .role-btn { background-color: #1e293b; border: 1px solid transparent; color: var(--text-muted); padding: 10px 12px; border-radius: 6px; text-align: left; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .role-btn:hover:not(:disabled) { background-color: #334155; color: white; }
        .role-btn.active { background-color: #0284c7; color: white; border-color: var(--accent-blue); }
        .role-btn:disabled { opacity: 0.3; cursor: not-allowed; text-decoration: line-through; }
        .role-btn-tally { font-size: 0.8rem; background-color: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; color: var(--accent-blue); }

        /* 中間唱票格網 */
        .main-panel { background-color: var(--panel-dark); border-radius: 10px; padding: 12px; border: 1px solid var(--border-dark); display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-dark); padding-bottom: 8px; }
        .panel-title { font-size: 1.25rem; font-weight: bold; color: var(--text-main); margin: 0; }
        
        /* 搜尋輸入框 */
        .search-box-container { display: flex; gap: 10px; width: 100%; }
        .search-input { flex: 1; padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border-dark); background-color: #0f172a; color: white; font-size: 1rem; outline: none; }
        .search-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 8px rgba(56,189,248,0.3); }

        /* 唱票滾動區域 */
        .scrollable-content { flex: 1; overflow-y: auto; padding-right: 4px; display: flex; flex-direction: column; gap: 20px; }

        /* 各大組獨立控制區塊 */
        .group-section { background-color: #101726; border: 1px solid var(--border-dark); border-radius: 8px; padding: 12px; }
        .group-section-title { font-size: 1.1rem; font-weight: bold; color: var(--accent-blue); border-left: 4px solid var(--accent-blue); padding-left: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* 候選人網格 */
        .candidate-grid { display: grid; gap: 8px; }
        .candidate-grid.dense { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
        .candidate-grid.spacious { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        
        /* 候選人卡片 */
        .cand-card { background-color: #0f172a; border: 1px solid var(--border-dark); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.15s; position: relative; user-select: none; }
        .cand-card:hover { border-color: var(--accent-blue); background-color: #1e293b; transform: translateY(-1px); }
        .cand-card:active { transform: translateY(1px); }
        
        /* 密集版尺寸 (第一階段召集人) */
        .candidate-grid.dense .cand-card { min-height: 85px; }
        .candidate-grid.dense .cand-name { font-size: 1rem; font-weight: bold; }
        .candidate-grid.dense .cand-votes { font-size: 1.5rem; font-weight: 800; color: var(--accent-green); }
        .candidate-grid.dense .church-badge { font-size: 0.75rem; color: var(--text-muted); }

        /* 聯控大字卡版尺寸 (第二階段各組) */
        .candidate-grid.spacious .cand-card { min-height: 100px; border: 1px solid var(--border-dark); }
        .candidate-grid.spacious .cand-name { font-size: 1.05rem; font-weight: bold; color: #ffffff; margin-top: 2px; }
        .candidate-grid.spacious .cand-votes { font-size: 1.8rem; font-weight: 800; color: var(--accent-gold); margin: 2px 0; }
        .candidate-grid.spacious .church-badge { font-size: 0.8rem; font-weight: bold; color: var(--accent-blue); }

        /* 扣票小按鈕 */
        .minus-btn { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background-color: #273549; border: none; color: var(--text-muted); font-size: 0.8rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .minus-btn:hover { background-color: var(--accent-red); color: white; }

        /* 右側控制面板 */
        .control-panel { background-color: var(--panel-dark); border-radius: 10px; padding: 12px; border: 1px solid var(--border-dark); display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .control-group-title { font-size: 0.95rem; font-weight: bold; color: var(--accent-blue); margin-top: 5px; border-left: 4px solid var(--accent-blue); padding-left: 6px; }
        .control-card { background-color: #0f172a; border: 1px solid var(--border-dark); border-radius: 6px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .control-val { font-size: 1.3rem; font-weight: bold; color: var(--accent-green); }
        
        /* 👥 實際出席人數微調按鈕樣式 */
        .attendee-btn { width: 34px; height: 34px; background-color: #273549; border: 1px solid var(--border-dark); color: white; font-weight: bold; font-size: 1.2rem; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
        .attendee-btn:hover { background-color: var(--accent-blue); color: black; }
        .attendee-input { width: 70px; text-align: center; background-color: #0f172a; border: 1px solid var(--border-dark); color: white; font-size: 1.2rem; font-weight: bold; padding: 6px; border-radius: 6px; outline: none; }
        .attendee-input:focus { border-color: var(--accent-blue); }

        .action-btn { width: 100%; padding: 10px; border-radius: 6px; border: none; font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: background-color 0.15s; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .btn-green { background-color: var(--accent-green); color: white; }
        .btn-green:hover { background-color: #059669; }
        .btn-blue { background-color: #0284c7; color: white; }
        .btn-blue:hover { background-color: #0369a1; }
        .btn-gray { background-color: #334155; color: white; }
        .btn-gray:hover { background-color: #1e293b; }
        .btn-red { background-color: var(--accent-red); color: white; }
        .btn-red:hover { background-color: #e11d48; }

        /* 歷史軌跡 */
        .history-list { background-color: #0f172a; border: 1px solid var(--border-dark); border-radius: 6px; height: 110px; overflow-y: auto; padding: 6px; font-size: 0.8rem; display: flex; flex-direction: column; gap: 4px; }
        .history-item { display: flex; justify-content: space-between; padding: 4px 6px; border-radius: 4px; background-color: #1e293b; border-left: 3px solid var(--accent-green); }
        .history-item.minus { border-left-color: var(--accent-red); }

        /* ==========================================
           🚨 席次超額閃爍呼吸警報
           ========================================== */
        @keyframes alertRedFlash {
            0%, 100% { background-color: #1e293b; border-color: var(--border-dark); }
            50% { background-color: #7f1d1d; border-color: var(--accent-red); box-shadow: 0 0 15px rgba(244,63,94,0.4); }
        }
        .over-limit-alert {
            animation: alertRedFlash 1.5s infinite;
        }

        /* ==========================================
           📺 獨立大螢幕投影看板樣式 (Viewer View)
           ========================================== */
        .viewer-container { padding: 20px; background-color: #05070f; min-height: 100vh; display: flex; flex-direction: column; gap: 12px; }
        .viewer-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e293b; padding-bottom: 10px; }
        .viewer-title { font-size: 2rem; font-weight: bold; color: var(--accent-blue); text-shadow: 0 0 15px rgba(56,189,248,0.4); margin: 0; }
        
        .viewer-stats-bar { display: flex; justify-content: space-around; background-color: #151f32; padding: 10px; border-radius: 8px; border: 1px solid var(--border-dark); }
        .viewer-stat-item { text-align: center; padding: 0 15px; border-radius: 6px; transition: background-color 0.3s; }
        .viewer-stat-val { font-size: 1.8rem; font-weight: 800; color: var(--accent-green); }
        .viewer-stat-lbl { color: var(--text-muted); font-size: 0.85rem; margin-top: 3px; }

        /* 大看板 */
        .viewer-main-grid { display: grid; gap: 15px; }
        .viewer-main-grid.single-col { grid-template-columns: 1fr; }
        .viewer-main-grid.multi-col { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        
        .viewer-panel { background-color: #101726; border-radius: 8px; padding: 14px; border: 1px solid #1e293b; box-shadow: 0 8px 12px -3px rgba(0,0,0,0.5); }
        .viewer-panel-title { font-size: 1.2rem; font-weight: bold; color: var(--accent-blue); margin-bottom: 10px; border-left: 4px solid var(--accent-blue); padding-left: 8px; display: flex; justify-content: space-between; align-items: center; }

        /* 投影排行榜柱狀圖 */
        .viewer-chart-list { display: flex; flex-direction: column; gap: 8px; }
        .viewer-bar-container { margin-bottom: 3px; }
        .viewer-bar-label { display: flex; justify-content: space-between; margin-bottom: 3px; font-size: 1rem; font-weight: bold; }
        .viewer-bar-outer { background-color: #1e293b; border-radius: 4px; height: 22px; width: 100%; overflow: hidden; border: 1px solid #273549; }
        .viewer-bar-inner { background-color: #0ea5e9; height: 100%; width: 0%; transition: width 0.4s cubic-bezier(0.1, 0.8, 0.25, 1); display: flex; align-items: center; padding-left: 10px; font-weight: bold; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); font-size: 0.8rem; }
        
        .viewer-bar-inner.gold-style { background-color: #d97706; }

        /* 👑 預計當選金色亮牌閃耀樣式 */
        .viewer-bar-inner.winner-bar {
            background: linear-gradient(90deg, #f59e0b, #d97706) !important;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
            border: 1px solid #f59e0b;
        }

        .rank-badge { display: inline-block; width: 18px; height: 18px; line-height: 18px; text-align: center; border-radius: 50%; font-size: 0.75rem; font-weight: bold; color: black; margin-right: 5px; vertical-align: middle; }
        .rank-1 { background-color: #f59e0b; }
        .rank-2 { background-color: #cbd5e1; }
        .rank-3 { background-color: #b45309; }
        .rank-normal { background-color: #475569; color: white; }

        /* ==========================================
           💎 自訂奢華風格對話確認視窗
           ========================================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 7, 15, 0.85); display: flex; align-items: center;
            justify-content: center; z-index: 9999; backdrop-filter: blur(5px);
            transition: opacity 0.2s;
        }
        .modal-box {
            background: #151f32; border: 2px solid #273549;
            border-radius: 12px; width: 420px; max-width: 90%; padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); text-align: center;
            animation: modalScaleUp 0.25s cubic-bezier(0.1, 0.8, 0.25, 1);
        }
        @keyframes modalScaleUp {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-header { font-size: 1.3rem; font-weight: bold; margin-bottom: 16px; color: var(--accent-blue); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .modal-body { font-size: 1.05rem; color: var(--text-main); margin-bottom: 24px; line-height: 1.6; }
        .modal-footer { display: flex; gap: 12px; justify-content: center; }
        .modal-btn { padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 0.95rem; transition: background-color 0.15s; }
        .modal-btn-primary { background: var(--accent-blue); color: black; }
        .modal-btn-primary:hover { background: #0284c7; }
        .modal-btn-danger { background: var(--accent-red); color: white; }
        .modal-btn-danger:hover { background: #dc2626; }
        .modal-btn-secondary { background: #475569; color: white; }
        .modal-btn-secondary:hover { background: #334155; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- ==========================================
     🎮 後台操作同工端
     ========================================== -->
<div id="consoleView">
    
    <!-- 雙階段切換器 -->
    <div class="phase-container">
        <button class="phase-btn active" id="phase1Btn" onclick="switchPhase(1)">
            👑 第一階段：召集人選舉 (主席)
        </button>
        <button class="phase-btn" id="phase2Btn" onclick="switchPhase(2)">
            💼 第二階段：工作小組選舉 (同張選票聯控)
        </button>
    </div>

    <div class="console-container">
        <!-- 左側導航欄 -->
        <div class="sidebar">
            <div class="sidebar-title">🏷️ 選舉職務分區</div>
            <button class="role-btn active" id="role-btn-召集人" onclick="handleRoleClick('召集人')">
                <span>召集人</span>
                <span class="role-btn-tally" id="sidebar-tally-召集人">0 票</span>
            </button>
            <button class="role-btn" id="role-btn-宣道" onclick="handleRoleClick('宣道')" disabled>
                <span>宣道組 (雙選)</span>
                <span class="role-btn-tally" id="sidebar-tally-宣道">0 票</span> 
            </button>
            <button class="role-btn" id="role-btn-教務" onclick="handleRoleClick('教務')" disabled>
                <span>教務</span>
                <span class="role-btn-tally" id="sidebar-tally-教務">0 票</span>
            </button>
            <button class="role-btn" id="role-btn-教育" onclick="handleRoleClick('教育')" disabled>
                <span>教育</span>
                <span class="role-btn-tally" id="sidebar-tally-教育">0 票</span>
            </button>
            <button class="role-btn" id="role-btn-事務" onclick="handleRoleClick('事務')" disabled>
                <span>事務</span>
                <span class="role-btn-tally" id="sidebar-tally-事務">0 票</span>
            </button>
            <button class="role-btn" id="role-btn-資訊" onclick="handleRoleClick('資訊')" disabled>
                <span>資訊</span>
                <span class="role-btn-tally" id="sidebar-tally-資訊">0 票</span>
            </button>
            <button class="role-btn" id="role-btn-會計" onclick="handleRoleClick('會計')" disabled>
                <span>會計</span>
                <span class="role-btn-tally" id="sidebar-tally-會計">0 票</span>
            </button>
            <button class="role-btn" id="role-btn-出納" onclick="handleRoleClick('出納')" disabled>
                <span>出納</span>
                <span class="role-btn-tally" id="sidebar-tally-出納">0 票</span>
            </button>
        </div>

        <!-- 中間唱票格網 -->
        <div class="main-panel">
            <div class="panel-header">
                <h2 class="panel-title" id="currentRoleTitle">召集人 <span class="badge badge-blue">應選 1 名</span></h2>
                <div id="speechIndicator" style="font-size: 0.85rem; color: var(--accent-green);">🔊 語音唱票已啟用</div>
            </div>

            <!-- 快速篩選框 -->
            <div class="search-box-container">
                <input type="text" id="searchInput" class="search-input" placeholder="💡 快速搜尋並登錄得票... (輸入姓名後按 Enter 自動加一票)" onkeydown="handleSearchKey(event)">
            </div>

            <!-- 可滾動內容區 -->
            <div class="scrollable-content" id="scrollContainer">
                <!-- 由 JavaScript 動態生成 -->
            </div>
        </div>

        <!-- 右側控制面板 -->
        <div class="control-panel">
            <div class="control-group-title">🖥️ 獨立大螢幕投影</div>
            <button class="action-btn btn-blue" onclick="openProjectorWindow()">📺 開啟獨立投影看板</button>

            <!-- 👥 實際出席人數設定區 -->
            <div class="control-group-title">👥 實際出席人數設定</div>
            <div class="control-card" style="display: flex; gap: 8px; justify-content: center; align-items: center; padding: 12px 10px;">
                <button class="attendee-btn" onclick="adjustAttendees(-1)">-</button>
                <input type="number" id="attendeeInput" class="attendee-input" value="77" min="1" max="100" onchange="handleAttendeeInputChange(this.value)">
                <button class="attendee-btn" onclick="adjustAttendees(1)">+</button>
            </div>

            <div class="control-group-title">📊 當前階段開票進度</div>
            <div class="control-card" id="totalBallotsCardConsole">
                <span>預估已投實體選票</span>
                <span class="control-val" id="totalBallotsCount">0 張</span>
            </div>
            <div class="control-card" style="font-size: 0.85rem; color: var(--text-muted); display: block; padding: 10px;">
                <div style="display:flex; justify-content:space-between; margin-bottom: 5px;">
                    <span>有效得票總計：</span>
                    <span id="validBallotsText">0 票</span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span>大會出席席次上限：</span>
                    <span id="invalidBallotsText">77 人</span>
                </div>
            </div>

            <div class="control-group-title">🎙️ 語音唱票設定</div>
            <div style="display: flex; gap: 10px;">
                <button class="action-btn btn-gray" id="muteBtn" onclick="toggleMute(true)" style="flex:1;">🔇 靜音</button>
                <button class="action-btn btn-gray" id="unmuteBtn" onclick="toggleMute(false)" style="flex:1; background-color:#1e3a8a;">🔊 唱票語音</button>
            </div>

            <div class="control-group-title">↩️ 唱票修正紀錄</div>
            <button class="action-btn btn-gray" onclick="undoLastAction()">↩️ 復原上一步 (扣回一票)</button>
            <div class="history-list" id="historyLogList">
                <div style="color: #64748b; text-align: center; padding-top: 35px;">暫無唱票紀錄</div>
            </div>

            <div class="control-group-title" style="margin-top: auto;">📁 大會總備份</div>
            <button class="action-btn btn-green" onclick="downloadCSVBackup()">📥 匯出大會總報表 (CSV)</button>
            <button class="action-btn btn-red" onclick="resetSystemWithConfirm()">⚠️ 系統清空歸零</button>
        </div>
    </div>
</div>

<!-- ==========================================
     📺 獨立大螢幕投影看板畫面
     ========================================== -->
<div id="viewerView" class="viewer-container hidden">
    <div class="viewer-header">
        <h1 class="viewer-title">115年小區職務會選舉開票看板</h1>
        <div class="badge badge-gold" style="font-size: 1.1rem; padding: 6px 15px;" id="viewerCurrentRoleBadge">第一階段：召集人選舉</div>
    </div>

    <!-- 頂部數據列 -->
    <div class="viewer-stats-bar">

function saveState() {

    syncToProjector();
}

function loadState() {
    const data = localStorage.getItem("BALLOT_TALLY_ELECTION_STATE_V4");
    if (data) {
        state = JSON.parse(data);
    } else {
        resetStateData();
    }
}

function resetStateData() {
    state.activePhase = 1;
    state.currentRole = "召集人";
    state.attendeesCount = 77; 
    state.votes = {};
    for (const [role, names] of Object.entries(CANDIDATES_DATA)) {

        names.forEach(name => {

        });
    }
    state.history = [];
    state.muteSpeech = false;
    saveState();
}

// 雙通道同步一：Storage 事件

        state = JSON.parse(e.newValue);
        updateUI();
    }
});

// 雙通道同步二：記憶體直連
function syncToProjector() {
    if (projectorWindowRef && !projectorWindowRef.closed) {
        try {
            if (typeof projectorWindowRef.receiveStateFromOpener === 'function') {
                projectorWindowRef.receiveStateFromOpener(state);
            }
        } catch (e) {
            console.log("Direct Memory Sync Bypassed: ", e);
        }
    }
}

window.receiveStateFromOpener = function(parentState) {

    updateUI();
};

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(`${category}，${name}，${count}票`);
        utterance.lang = "zh-TW";
        utterance.rate = 1.15;
        window.speechSynthesis.speak(utterance);
    } catch (e) {
        console.log("語音模組未就緒。");
    }
}

function adjustAttendees(amount) {
    let current = parseInt(state.attendeesCount) || 77;
    current = Math.max(1, current + amount);
    state.attendeesCount = current;
    
    const input = document.getElementById('attendeeInput');
    if (input) input.value = current;

    saveState();
    updateUI();
}

function handleAttendeeInputChange(value) {
    let val = parseInt(value);
    if (isNaN(val) || val < 1) val = 1;
    state.attendeesCount = val;

    saveState();
    updateUI();
}

// ==========================================
// 🎯 核心唱票 (席次防溢出聯鎖控制)
// ==========================================
function addVote(role, name) {
    const roleVotes = state.votes[role] || {};
    const sumOfVotes = Object.values(roleVotes).reduce((a, b) => a + b, 0);
    const simulatedSum = sumOfVotes + 1;
    const simulatedBallots = LIMITS[role] === 1 ? simulatedSum : Math.ceil(simulatedSum / 2);

    if (simulatedBallots > state.attendeesCount) {
        showCustomAlert(
            "🚨 席次超額攔截警報", 
            `無法登錄選票！【${role}】開出張數 (${simulatedBallots} 張) 已超過今日大會實際出席人數 (${state.attendeesCount} 人)。<br><br>請先確認選票是否勾選多於限制，或至控制台調校「實際出席人數」。`
        );
        speakWarningAlert(`警告！${role}票數已達人數上限`);
        return;
    }

    executeAddVote(role, name);
}

function executeAddVote(role, name) {
    state.votes[role][name] = (state.votes[role][name] || 0) + 1;
    
    state.history.push({
        action: "ADD",
        role: role,
        name: name,
        timestamp: new Date().toLocaleTimeString()
    });

    speakVote(role, name, state.votes[role][name]);
    saveState();
    updateUI();
}

function minusVote(role, name) {
    if (!state.votes[role][name] || state.votes[role][name] <= 0) return;
    
    state.votes[role][name] -= 1;
    state.history.push({
        action: "MINUS",
        role: role,
        name: name,
        timestamp: new Date().toLocaleTimeString()
    });

    speakVote(`扣票${role}`, name, `目前${state.votes[role][name]}票`);
    saveState();
    updateUI();
}

function undoLastAction() {
    if (state.history.length === 0) {
        showCustomAlert("提示", "無唱票紀錄可供復原！");
        return;
    }

    const last = state.history.pop();
    if (last.action === "ADD") {
        state.votes[last.role][last.name] -= 1;
        speakVote(`復原${last.role}`, last.name, `減回一票`);
    } else {
        state.votes[last.role][last.name] += 1;
        speakVote(`復原${last.role}`, last.name, `加回一票`);
    }

    saveState();
    updateUI();
}

function speakWarningAlert(msg) {
    if (state.muteSpeech) return;
    try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(msg);
        utterance.lang = "zh-TW";
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    } catch (e) {}
}

        const query = event.target.value.trim();
        if (!query) return;

        let matched = [];
        
        if (state.activePhase === 1) {
            const candidates = CANDIDATES_DATA["召集人"];
            const found = candidates.filter(name => name.includes(query));
            found.forEach(name => matched.push({ role: "召集人", name: name }));
        } else {
            const roles = ["教務", "教育", "宣道", "事務", "資訊", "會計", "出納"];
            roles.forEach(role => {
                const candidates = CANDIDATES_DATA[role];
                const found = candidates.filter(name => name.includes(query));
                found.forEach(name => matched.push({ role: role, name: name }));
            });
        }

        if (matched.length === 1) {
            addVote(matched[0].role, matched[0].name);
            event.target.value = '';
            filterConsoleCards('');
        } else if (matched.length > 1) {
            addVote(matched[0].role, matched[0].name);
            event.target.value = '';
            filterConsoleCards('');
        } else {
            showCustomAlert("搜尋無匹配", `在當前階段候選人中，找不到名稱含有「${query}」的人。`);
        }
    } else {
        setTimeout(() => {
            filterConsoleCards(event.target.value.trim());
        }, 50);
    }
}

function filterConsoleCards(query) {
    const cards = document.querySelectorAll('.cand-card');
    cards.forEach(card => {
        const name = card.dataset.name;
        if (name.includes(query)) {
            card.style.display = "flex";
            const section = card.closest('.group-section');
            if (section) section.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });

    if (state.activePhase === 2 && query !== '') {
        document.querySelectorAll('.group-section').forEach(sec => {
            const visibleCards = sec.querySelectorAll('.cand-card[style="display: flex;"]');
            if (visibleCards.length === 0) {
                sec.style.display = "none";
            } else {
                sec.style.display = "block";
            }
        });
    } else if (query === '') {
        document.querySelectorAll('.group-section').forEach(sec => sec.style.display = "block");
    }
}

            } else {

                <div class="viewer-panel">

                .filter(([name, count]) => count > 0)

            } else {
                const limit = LIMITS["召集人"];

                sorted.forEach(([name, count], index) => {
                    const percentage = (count / maxVote) * 100;
                    let rankClass = "rank-normal";
                    if (index === 0) rankClass = "rank-1";
                    else if (index === 1) rankClass = "rank-2";
                    else if (index === 2) rankClass = "rank-3";

                    const church = CONVENER_CHURCH_MAP[name] || "小區";
                    
                    const isWinner = index < limit;
                    const winnerBadge = isWinner ? `<span style="background-color: #78350f; color: #fcd34d; border: 1px solid #d97706; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-left: 8px;">👑 預計當選</span>` : '';

                        <div class="viewer-bar-container">

            grid.className = "viewer-main-grid multi-col";

            const roles = ["教務", "教育", "宣道", "事務", "資訊", "會計", "出納"];
            
            roles.forEach(role => {
                const sum = Object.values(state.votes[role] || {}).reduce((a, b) => a + b, 0);

                if (ballots > maxActualBallots) maxActualBallots = ballots;
            });

            document.getElementById('viewerTotalBallots').innerText = `${maxActualBallots} 張`;
            const percent = Math.min(Math.round((maxActualBallots / state.attendeesCount) * 100), 100);
            document.getElementById('viewerTurnoutRate').innerText = `${percent}%`;

            const viewerStatsBar = document.getElementById('totalBallotsCardViewer');
            if (maxActualBallots >= state.attendeesCount) {
                viewerStatsBar.classList.add('over-limit-alert');
            } else {
                viewerStatsBar.classList.remove('over-limit-alert');
            }

            roles.forEach(role => {
                const roleVotes = state.votes[role] || {};
                const sorted = Object.entries(roleVotes)
                    .filter(([name, count]) => count > 0)
                    .sort((a, b) => b[1] - a[1]);

                const maxVote = sorted.length > 0 ? sorted[0][1] : 1;
                const isDouble = LIMITS[role] === 2 ? " (應選2名)" : "";

                let roleHtml = `
                    <div class="viewer-panel">
                        <div class="viewer-panel-title">
                            <span>【${role}】${isDouble}</span>
                        </div>
                        <div class="viewer-chart-list">
                `;

                if (sorted.length === 0) {
                    roleHtml += `<div style="text-align: center; color: var(--text-muted); padding: 50px 0; font-size: 0.9rem;">等待選票...</div>`;
                } else {
                    const limit = LIMITS[role];

                    sorted.slice(0, 5).forEach(([name, count], index) => {
                        const percentage = (count / maxVote) * 100;
                        let rankClass = "rank-normal";
                        if (index === 0) rankClass = "rank-1";
                        else if (index === 1) rankClass = "rank-2";
                        else if (index === 2) rankClass = "rank-3";

                        const church = CHURCH_MAP[role]?.[name] || "小區";
                        
                        const isWinner = index < limit;
                        const winnerBadge = isWinner ? `<span style="background-color: #78350f; color: #fcd34d; border: 1px solid #d97706; padding: 1px 4px; border-radius: 3px; font-size: 0.65rem; font-weight: bold; margin-left: 4px;">👑 當選</span>` : '';
                        const winnerClass = isWinner ? 'winner-bar' : '';

                        roleHtml += `
                            <div class="viewer-bar-container">
                                <div class="viewer-bar-label" style="font-size:0.9rem;">
                                    <span><span class="rank-badge ${rankClass}" style="width:15px; height:15px; line-height:15px; font-size:0.65rem;">${index + 1}</span> [${church}] ${name} ${winnerBadge}</span>

                                </div>
                                <div class="viewer-bar-outer" style="height:16px;">
                                    <div class="viewer-bar-inner ${winnerClass}" style="width: ${percentage}%;"></div>
                                </div>
                            </div>
                        `;
                    });
                }

                roleHtml += `</div></div>`;
                grid.innerHTML += roleHtml;
            });
        }

    } else {
        // ==========================================
        // 🎮 後台同工操作端
        // ==========================================
        document.getElementById('consoleView').classList.remove('hidden');
        document.getElementById('viewerView').classList.add('hidden');

        if (state.activePhase === 1) {
            document.getElementById('phase1Btn').classList.add('active');
            document.getElementById('phase2Btn').classList.remove('active');
            document.getElementById('phase2Btn').classList.remove('gold-mode');
            enableSidebarRoles(false);
            document.getElementById(`role-btn-召集人`).classList.add('active');

            document.getElementById('phase2Btn').classList.add('active');
            document.getElementById('phase2Btn').classList.add('gold-mode');
            document.getElementById('phase1Btn').classList.remove('active');

            document.querySelectorAll('.role-btn').forEach(btn => {
                if (btn.id === `role-btn-${state.currentRole}`) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        const scrollContainer = document.getElementById('scrollContainer');
        scrollContainer.innerHTML = '';

        if (state.activePhase === 1) {
            // 第一階段：77人召集人字卡。按 11 間教會自動分割，結構超級清晰！
            let html = '';
            Object.entries(CHURCH_MEMBERS).forEach(([church, members]) => {
                let sectionHtml = `
                    <div class="group-section" id="section-convener-${church}">
                        <div class="group-section-title" style="color: var(--accent-gold); border-left-color: var(--accent-gold);">
                            <span>👑 ${church}教會 (${members.length}席)</span>
                        </div>
                        <div class="candidate-grid dense">
                `;
                
                members.forEach(name => {
                    const count = state.votes["召集人"][name] || 0;
                    sectionHtml += `
                        <div class="cand-card" data-name="${name}" onclick="addVote('召集人', '${name}')">
                            <button class="minus-btn" onclick="event.stopPropagation(); minusVote('召集人', '${name}')">減</button>

                            <div class="cand-name">${name}</div>
                        </div>
                    `;
                });
                
                sectionHtml += `</div></div>`;
                html += sectionHtml;
            });

        } else {
            // 第二階段：工作小組幹部字卡聯控唱票
            const roles = ["教務", "教育", "宣道", "事務", "資訊", "會計", "出納"];
            
            roles.forEach(role => {
                const roleVotes = state.votes[role] || {};
                const isDouble = LIMITS[role] === 2 ? " (雙選)" : "";
                
                let groupHtml = `
                    <div class="group-section" id="section-${role}">
                        <div class="group-section-title">
                            <span>【${role}】${isDouble}</span>
                            <span class="badge badge-blue">限選 ${LIMITS[role]} 名</span>
                        </div>
                        <div class="candidate-grid spacious">
                `;

                Object.entries(roleVotes).forEach(([name, count]) => {
                    const church = CHURCH_MAP[role]?.[name] || "小區";
                    groupHtml += `
                        <div class="cand-card" data-name="${name}" onclick="addVote('${role}', '${name}')">
                            <button class="minus-btn" onclick="event.stopPropagation(); minusVote('${role}', '${name}')">減</button>
                            <div class="cand-votes">${count}</div>
                            <div class="church-badge">[${church}]</div>
                            <div class="cand-name">${name}</div>
                        </div>
                    `;
                });

                groupHtml += `</div></div>`;
                scrollContainer.innerHTML += groupHtml;
            });
        }

        // 4. 更新左側側邊欄小計
        for (const [role, names] of Object.entries(CANDIDATES_DATA)) {
            const votesObj = state.votes[role] || {};
            const sumOfVotes = Object.values(votesObj).reduce((a, b) => a + b, 0);
            const totalBallotsForRole = LIMITS[role] === 1 ? sumOfVotes : Math.ceil(sumOfVotes / 2);
            document.getElementById(`sidebar-tally-${role}`).innerText = `${totalBallotsForRole} 票`;
        }

        // 5. 更新右側控制面板統計與 🚨 呼吸警報
        let currentBallots = 0;
        let currentSum = 0;

        if (state.activePhase === 1) {
            currentSum = Object.values(state.votes["召集人"] || {}).reduce((a, b) => a + b, 0);
            currentBallots = currentSum;
        } else {
            const roles = ["教務", "教育", "宣道", "事務", "資訊", "會計", "出納"];
            roles.forEach(role => {
                const sum = Object.values(state.votes[role] || {}).reduce((a, b) => a + b, 0);
                const ballots = LIMITS[role] === 1 ? sum : Math.ceil(sum / 2);
                currentSum += sum;
                if (ballots > currentBallots) currentBallots = ballots;
            });
        }

        document.getElementById('totalBallotsCount').innerText = `${currentBallots} 張`;
        document.getElementById('validBallotsText').innerText = `${currentSum} 票`;
        document.getElementById('invalidBallotsText').innerText = `${state.attendeesCount} 人`;

        const consoleTallyCard = document.getElementById('totalBallotsCardConsole');
        if (currentBallots >= state.attendeesCount) {
            consoleTallyCard.classList.add('over-limit-alert');
        } else {
            consoleTallyCard.classList.remove('over-limit-alert');
        }

        const logList = document.getElementById('historyLogList');
        if (state.history.length === 0) {
            logList.innerHTML = `<div style="color: #64748b; text-align: center; padding-top: 35px;">暫無唱票紀錄</div>`;
        } else {
            logList.innerHTML = '';
            [...state.history].reverse().slice(0, 15).forEach(log => {
                const logClass = log.action === "MINUS" ? "history-item minus" : "history-item";
                const actText = log.action === "MINUS" ? "扣回 1 票" : "加 1 票";
                logList.innerHTML += `
                    <div class="${logClass}">
                        <span>[${log.role}] ${log.name}</span>
                        <strong style="font-size: 0.8rem; color: var(--accent-blue);">${actText}</strong>
                    </div>
                `;
            });
        }
    }
}

// 🧹 內建自訂對話框機制
// ==========================================
function showCustomAlert(title, message) {
    const modal = document.getElementById('customModal');
    document.getElementById('modalHeader').innerHTML = `🚨 ${title}`;
    document.getElementById('modalBody').innerHTML = message;
    
    const footer = document.getElementById('modalFooter');
    footer.innerHTML = `
        <button class="modal-btn modal-btn-primary" onclick="closeCustomModal()">確定</button>
    `;
    modal.classList.remove('hidden');
}

function showCustomConfirm(title, message, onConfirm) {
    const modal = document.getElementById('customModal');
    document.getElementById('modalHeader').innerHTML = `⚠️ ${title}`;
    document.getElementById('modalBody').innerHTML = message;
    
    const footer = document.getElementById('modalFooter');
    footer.innerHTML = `
        <button class="modal-btn modal-btn-secondary" onclick="closeCustomModal()">取消操作</button>
        <button class="modal-btn modal-btn-danger" id="modalConfirmBtn">確定執行</button>
    `;
    
    document.getElementById('modalConfirmBtn').onclick = function() {
        onConfirm();
        closeCustomModal();
    };
    modal.classList.remove('hidden');
}

function closeCustomModal() {
    document.getElementById('customModal').classList.add('hidden');
}

}

// ==========================================
// 📁 大合一 Excel (CSV) 匯出
// ==========================================
function downloadCSVBackup() {
    let csvContent = "\ufeff"; 
    csvContent += "大會階段,選舉職務,推薦教會,候選人姓名,已唱得票數\n";

    for (const [role, roleVotes] of Object.entries(state.votes)) {
        const phase = role === "召集人" ? "第一階段" : "第二階段";
        
        for (const [name, count] of Object.entries(roleVotes)) {
            const church = (role === "召集人" ? CONVENER_CHURCH_MAP[name] : CHURCH_MAP[role]?.[name]) || "小區";
            csvContent += `"${phase}","${role}","${church}","${name}",${count}\n`;
        }
    }

    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    const now = new Date().toISOString().slice(0, 10).replace(/-/g, "");
    
    link.setAttribute("href", url);
    link.setAttribute("download", `115年小區職務會實體紙本開票總報表_${now}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
